<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cat Clicker 🐱</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');

    * { font-family: 'Nunito', sans-serif; }

    #cat-container {
      transition: transform 0.1s ease;
    }
    #cat-container:active {
      transform: scale(0.93);
    }

    .reaction-bubble {
      position: absolute;
      font-size: 1.5rem;
      font-weight: 800;
      pointer-events: none;
      animation: floatUp 1.2s ease forwards;
      white-space: nowrap;
      text-shadow: 0 2px 8px rgba(0,0,0,0.18);
      z-index: 50;
    }

    @keyframes floatUp {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      60%  { opacity: 1; transform: translateY(-60px) scale(1.2); }
      100% { opacity: 0; transform: translateY(-110px) scale(0.8); }
    }

    #cat-img {
      transition: filter 0.2s;
    }
    #cat-img.clicked {
      filter: brightness(1.3) drop-shadow(0 0 18px #f9a8d4);
    }

    .progress-bar-inner {
      transition: width 0.3s cubic-bezier(.4,0,.2,1);
    }

    body {
      background: linear-gradient(135deg, #fdf4ff 0%, #fce7f3 50%, #ede9fe 100%);
      min-height: 100vh;
    }
  </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

  <!-- Card utama -->
  <div class="bg-white/80 backdrop-blur-md rounded-3xl shadow-2xl p-8 flex flex-col items-center gap-6 w-full max-w-sm border border-pink-100">

    <!-- Judul -->
    <h1 class="text-3xl font-extrabold text-pink-500 tracking-tight">Cat Clicker 🐾</h1>

    <!-- Area kucing -->
    <div class="relative flex items-center justify-center select-none" id="cat-area">
      <button
        id="cat-container"
        class="rounded-full overflow-hidden shadow-xl border-4 border-pink-200 w-52 h-52 bg-pink-50 flex items-center justify-center cursor-pointer focus:outline-none focus:ring-4 focus:ring-pink-300"
        aria-label="Klik kucing"
      >
        <img
          id="cat-img"
          src="https://cataas.com/cat"
          alt="Kucing lucu"
          class="w-full h-full object-cover"
          draggable="false"
        />
      </button>

      <!-- Reaction muncul di sini lewat JS -->
    </div>

    <!-- Mood kucing -->
    <div id="mood-box" class="text-2xl font-bold text-purple-500 min-h-[2rem] text-center transition-all duration-300">
      Klik aku! 👆
    </div>

    <!-- Counter -->
    <div class="flex flex-col items-center gap-1 w-full">
      <div class="flex items-center gap-2">
        <span class="text-gray-500 font-semibold text-sm">Total klik:</span>
        <span id="click-count" class="text-3xl font-extrabold text-pink-500">0</span>
      </div>

      <!-- Progress bar ke level berikutnya -->
      <div class="w-full bg-pink-100 rounded-full h-3 mt-1 overflow-hidden">
        <div id="progress-bar" class="progress-bar-inner h-3 rounded-full bg-gradient-to-r from-pink-400 to-purple-400" style="width: 0%"></div>
      </div>
      <span id="level-label" class="text-xs text-gray-400 font-semibold mt-0.5">Level 1 — 0 / 10 klik</span>
    </div>

    <!-- Level badge -->
    <div class="flex items-center gap-2 bg-gradient-to-r from-pink-100 to-purple-100 px-5 py-2 rounded-full shadow-sm">
      <span class="text-lg">🏅</span>
      <span id="level-badge" class="font-bold text-purple-600 text-sm">Pemula Menggemaskan</span>
    </div>

    <!-- Ganti foto kucing -->
    <button
      id="new-cat-btn"
      class="mt-1 px-6 py-2 bg-pink-400 hover:bg-pink-500 active:scale-95 text-white font-bold rounded-full shadow transition-all duration-150 text-sm"
    >
      🔀 Ganti Kucing
    </button>

  </div>

  <!-- Footer -->
  <p class="mt-6 text-xs text-gray-400">Foto kucing dari <a href="https://cataas.com" target="_blank" class="underline hover:text-pink-400">cataas.com</a></p>

  <script>
    // ─── Data ────────────────────────────────────────────────────────────────

    const reactions = [
      { emoji: "😻", text: "Uwu~" },
      { emoji: "😾", text: "Jangan ganggu!" },
      { emoji: "🐾", text: "Tepuk-tepuk..." },
      { emoji: "😸", text: "Hehehe!" },
      { emoji: "🙀", text: "ASTAGA!" },
      { emoji: "😹", text: "Hahaha!" },
      { emoji: "😼", text: "Hmm..." },
      { emoji: "🐱", text: "Meow~" },
      { emoji: "💤", text: "ZzZz..." },
      { emoji: "😤", text: "Mengganggu!" },
      { emoji: "🥰", text: "Makasih!" },
      { emoji: "👀", text: "...?" },
      { emoji: "💫", text: "Pusing!" },
      { emoji: "❤️",  text: "Love you!" },
      { emoji: "🍣", text: "Mana ikannya?!" },
    ];

    const levels = [
      { min: 0,   max: 10,   label: "Pemula Menggemaskan",  emoji: "🐱" },
      { min: 10,  max: 30,   label: "Teman Kucing",         emoji: "🐈" },
      { min: 30,  max: 60,   label: "Pencinta Kucing",       emoji: "😺" },
      { min: 60,  max: 100,  label: "Ahli Menggemaskan",    emoji: "🐾" },
      { min: 100, max: 200,  label: "Kucing Sejati",         emoji: "👑" },
      { min: 200, max: Infinity, label: "DEWA KUCING",       emoji: "✨" },
    ];

    // ─── State ───────────────────────────────────────────────────────────────

    let clicks = 0;

    // ─── Elements ────────────────────────────────────────────────────────────

    const catContainer = document.getElementById('cat-container');
    const catImg       = document.getElementById('cat-img');
    const catArea      = document.getElementById('cat-area');
    const clickCount   = document.getElementById('click-count');
    const moodBox      = document.getElementById('mood-box');
    const progressBar  = document.getElementById('progress-bar');
    const levelLabel   = document.getElementById('level-label');
    const levelBadge   = document.getElementById('level-badge');
    const newCatBtn    = document.getElementById('new-cat-btn');

    // ─── Helpers ─────────────────────────────────────────────────────────────

    function getRandom(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function getCurrentLevel() {
      return levels.find(l => clicks >= l.min && clicks < l.max) ?? levels[levels.length - 1];
    }

    function updateUI() {
      clickCount.textContent = clicks;

      const lvl = getCurrentLevel();
      const progress = lvl.max === Infinity
        ? 100
        : ((clicks - lvl.min) / (lvl.max - lvl.min)) * 100;
      const remaining = lvl.max === Infinity ? "MAX" : lvl.max - clicks;

      progressBar.style.width = `${Math.min(progress, 100)}%`;
      levelLabel.textContent = lvl.max === Infinity
        ? `${lvl.emoji} Level MAX — DEWA KUCING!`
        : `${lvl.emoji} ${lvl.label} — ${clicks - lvl.min} / ${lvl.max - lvl.min} klik`;
      levelBadge.textContent = `${lvl.emoji} ${lvl.label}`;
    }

    function spawnReaction(x, y) {
      const reaction = getRandom(reactions);
      const bubble = document.createElement('div');
      bubble.className = 'reaction-bubble';
      bubble.textContent = `${reaction.emoji} ${reaction.text}`;

      // Posisi relatif ke cat-area
      const rect = catArea.getBoundingClientRect();
      bubble.style.left = `${x - rect.left - 40}px`;
      bubble.style.top  = `${y - rect.top  - 20}px`;

      // Warna random
      const colors = ['#f43f5e','#a855f7','#3b82f6','#10b981','#f59e0b','#ec4899'];
      bubble.style.color = getRandom(colors);

      catArea.appendChild(bubble);
      moodBox.textContent = `${reaction.emoji} ${reaction.text}`;

      bubble.addEventListener('animationend', () => bubble.remove());
    }

    function clickCat(event) {
      clicks++;
      updateUI();

      // Koordinat klik
      const clientX = event.touches ? event.touches[0].clientX : event.clientX;
      const clientY = event.touches ? event.touches[0].clientY : event.clientY;
      spawnReaction(clientX, clientY);

      // Flash effect
      catImg.classList.add('clicked');
      setTimeout(() => catImg.classList.remove('clicked'), 200);
    }

    function loadNewCat() {
      // Tambah timestamp biar tidak cache
      catImg.src = `https://cataas.com/cat?ts=${Date.now()}`;
      moodBox.textContent = '🔄 Kucing baru datang!';
    }

    // ─── Event Listeners ─────────────────────────────────────────────────────

    catContainer.addEventListener('click', clickCat);
    catContainer.addEventListener('touchstart', (e) => {
      e.preventDefault();
      clickCat(e);
    }, { passive: false });

    newCatBtn.addEventListener('click', loadNewCat);

    // ─── Init ────────────────────────────────────────────────────────────────

    updateUI();
  </script>
</body>
</html>
